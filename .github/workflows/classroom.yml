name: E2E (docker-compose)

on:
  - push
  - pull_request
  - workflow_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    if: github.actor != 'github-classroom[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show docker versions
        run: |
          docker --version
          docker compose version || docker-compose --version

      - name: Start services
        run: |
          if docker compose version; then
            docker compose up -d --build
          else
            docker-compose up -d --build
          fi

      - name: Wait for service on :8080
        shell: bash
        run: |
          set -euo pipefail

          URL="http://localhost:8080/"
          echo "Waiting for ${URL} ..."

          for i in {1..120}; do
            if curl -fsS "$URL" >/dev/null 2>&1; then
              echo "Service is up!"
              exit 0
            fi
            sleep 1
          done

          echo "Service did not become ready in time"
          if docker compose version; then
            docker compose ps
            docker compose logs --no-color --tail=200
          else
            docker-compose ps
            docker-compose logs --no-color --tail=200
          fi
          exit 1

      - name: Run e2e tests and grade
        uses: classroom-resources/autograding-command-grader@v1
        env:
          BASE_URL: "http://localhost:8080"
        with:
          test-name: Run e2e tests and grade
          max-score: 5
          timeout: 1800
          setup-command: ''
          command: |
            set +e

            sudo apt-get update -qq
            sudo apt-get install -y jq

            echo "Running e2e..."
            ./tests/agoge-cli e2e-tests --task=agoge-e2e-shop --json --base-url=${{ env.BASE_URL }} 2>&1 | tee e2e-output.txt > result.json
            TEST_EXIT=${PIPESTATUS[0]}

            SCORE=0
            REASON=""

            # Пробуем распарсить JSON и достать score
            if jq -e . >/dev/null 2>&1 < result.json; then
              PARSED_SCORE="$(jq -r '.score // empty' result.json 2>/dev/null)"
              if [[ "$PARSED_SCORE" =~ ^[0-5]$ ]]; then
                SCORE="$PARSED_SCORE"
              else
                REASON="JSON valid, but .score missing or not in 0..5"
              fi
            else
              REASON="Invalid JSON output"
            fi

            # Если тесты упали - score=0 (даже если JSON был)
            if [[ "$TEST_EXIT" -ne 0 ]]; then
              SCORE=0
              if [[ -n "$REASON" ]]; then
                REASON="$REASON; tests exited with code $TEST_EXIT"
              else
                REASON="Tests exited with code $TEST_EXIT"
              fi
            fi

            # Feedback в Checks (Step Summary + annotations)
            {
              echo "## E2E Autograding"
              echo ""
              echo "- **Score:** \`${SCORE}/5\`"
              echo "- **Base URL:** \`${BASE_URL}\`"
              echo "- **Tests exit code:** \`${TEST_EXIT}\`"
              if [[ -n "$REASON" ]]; then
                echo "- **Fallback used:** ✅"
                echo "- **Reason:** ${REASON}"
              else
                echo "- **Fallback used:** ❌"
              fi
              echo ""
              echo "### Artifacts"
              echo "This run uploads:"
              echo "- \`result.json\` (raw tool output)"
              echo "- \`e2e-output.txt\` (stdout/stderr log)"
            } >> "$GITHUB_STEP_SUMMARY"

            if [[ -n "$REASON" ]]; then
              echo "::warning title=Autograding fallback used::Score set to 0. Reason: ${REASON}"
            else
              echo "::notice title=Autograding::Score ${SCORE}/5"
            fi

            # В stdout выводим ТОЛЬКО число — его и возьмёт classroom grader
            echo "$SCORE"

            # Всегда успешно завершаем шаг, чтобы оценка прошла
            exit 0

      # 👇 Artifacts: JSON + log
      - name: Upload autograding artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-autograding
          path: |
            result.json
            e2e-output.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Stop services (always)
        if: always()
        run: |
          if docker compose version; then
            docker compose down -v
          else
            docker-compose down -v
          fi